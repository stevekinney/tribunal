app = "tribunal-web"
primary_region = "dfw"

[build]
  dockerfile = "../containers/web.Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  TRIBUNAL_ENGINE_URL = "http://tribunal-engine.flycast"

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
