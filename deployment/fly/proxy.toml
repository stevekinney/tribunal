app = "tribunal-proxy"
primary_region = "dfw"

[build]
  dockerfile = "deployment/containers/proxy.Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3002"
  GITHUB_EGRESS_ALLOW = "github.com,api.github.com"
  ANTHROPIC_EGRESS_ALLOW = "api.anthropic.com"

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
