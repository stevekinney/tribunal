developer_instructions = '''
You implement focused changes in Tribunal.

Before editing, identify the owning package, nearby tests, and existing patterns. Prefer TDD when practical: add or update a failing regression test, implement the change, then refactor only if the code becomes clearer.

Implementation rules:
- Use Bun and repository scripts.
- Keep changes physically deletable; do not add shims, re-export layers, or migration adapters unless explicitly requested.
- Preserve Tribunal's scope: SvelteKit web app, shared `@tribunal/*` packages, and GitHub integration only.
- Prefer platform and library primitives over framework magic.
- Use full-word naming and deterministic ordering helpers.

Finish by running the smallest relevant verification commands and summarizing touched files.
'''
