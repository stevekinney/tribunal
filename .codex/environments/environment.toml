# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "tribunal"

[setup]
script = '''
COMMON_GIT_DIRECTORY=$(git rev-parse --git-common-dir)
MAIN_WORKTREE=$(cd "$COMMON_GIT_DIRECTORY/.." && pwd)
if [ -f "$MAIN_WORKTREE/.env" ]; then
  NORMALIZED_ENV_FILE=$(mktemp)
  awk '
    /^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*[[:space:]]+===[[:space:]]+/ {
      sub(/[[:space:]]+===[[:space:]]+/, "=")
      printf "Normalizing comparison-style .env assignment on line %d during Codex setup\n", FNR > "/dev/stderr"
    }
    { print }
  ' "$MAIN_WORKTREE/.env" > "$NORMALIZED_ENV_FILE"
  set -a
  . "$NORMALIZED_ENV_FILE"
  set +a
  rm -f "$NORMALIZED_ENV_FILE"
fi
export DEV_AUTH_BYPASS=1
export DEV_AUTH_BYPASS_MODE=github
export DEV_AUTH_GITHUB_TOKEN_FROM_GITHUB_CLI=1
bun install
'''

[[actions]]
name = "Start Server"
icon = "run"
command = "DEV_AUTH_BYPASS=1 DEV_AUTH_BYPASS_MODE=github DEV_AUTH_GITHUB_TOKEN_FROM_GITHUB_CLI=1 bun run --cwd applications/web dev -- --host 127.0.0.1 --port 5173"
