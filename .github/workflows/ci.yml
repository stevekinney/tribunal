name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
  TURBO_SCM_HEAD: ${{ github.event_name == 'pull_request' && github.sha || '' }}

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - name: Type check
        run: bunx turbo run check ${{ github.event_name == 'pull_request' && '--affected' || '' }}
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - name: Format check
        run: bun run format:check
      - name: Lint
        run: bunx turbo run lint ${{ github.event_name == 'pull_request' && '--affected' || '' }}
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run package tests
        shell: bash
        run: |
          set -o pipefail
          bunx turbo run test --filter='!@tribunal/web' 2>&1 | tee "$RUNNER_TEMP/test-packages.log"
      - name: Run unit tests (server)
        shell: bash
        run: |
          set -o pipefail
          bun run --cwd applications/web test:unit:server -- --run 2>&1 | tee "$RUNNER_TEMP/test-server.log"
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Scan test output for timeout signatures
        if: failure()
        shell: bash
        run: |
          echo "::group::Timeout signature scan"

          TIMEOUT_PATTERNS='Hook timed out|timed out|ETIMEDOUT|setTimeout.*exceeded|hookTimeout'
          FOUND_SIGNATURES=0

          for logfile in "$RUNNER_TEMP"/test-packages.log "$RUNNER_TEMP"/test-server.log; do
            if [ ! -f "$logfile" ]; then
              echo "[TRIBUNAL-CI-SCAN] Log file not found: $logfile (step may not have run)"
              continue
            fi

            matches=$(grep -icE "$TIMEOUT_PATTERNS" "$logfile" || true)
            if [ "$matches" -gt 0 ]; then
              FOUND_SIGNATURES=1
              echo ""
              echo "[TRIBUNAL-CI-SCAN] timeout-signature-detected in $(basename "$logfile") ($matches match(es)):"
              grep -inE "$TIMEOUT_PATTERNS" "$logfile" || true
            fi
          done

          echo ""
          if [ "$FOUND_SIGNATURES" -eq 1 ]; then
            echo "[TRIBUNAL-CI-SCAN] RESULT: timeout-signature-detected"
            echo "[TRIBUNAL-CI-SCAN] The failure likely involves a timeout. See packages/test/src/database.ts for PGlite timing diagnostics."
          else
            echo "[TRIBUNAL-CI-SCAN] RESULT: timeout-signature-not-detected"
            echo "[TRIBUNAL-CI-SCAN] No timeout patterns found in test output. The failure is likely a genuine test assertion error."
          fi

          echo ""
          echo "[TRIBUNAL-CI-TIMEOUT-HINT] If the scan missed a pattern, check the raw logs above for 'Hook timed out' or 'timed out'."
          echo "[TRIBUNAL-CI-TIMEOUT-HINT] See packages/test/src/database.ts for the timing diagnostic and packages/test/src/database-timing.test.ts for the soft-assert timing test."

          echo "::endgroup::"

  coverage:
    name: Coverage Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # The web client coverage gate renders components in real Chromium.
      - uses: ./.github/actions/setup-playwright
      - name: Enforce 100% lines/functions coverage gates
        shell: bash
        run: |
          set -o pipefail
          bun run test:coverage 2>&1 | tee "$RUNNER_TEMP/test-coverage.log"
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  test-browser:
    name: Browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for browser-testable changes
        id: browser-changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD -- \
              'applications/web/src/**' \
              'applications/web/test/**' \
              '**/*.svelte' \
              '.github/workflows/ci.yml' \
              '.github/actions/setup-playwright/**' || true)
            if [ -n "$CHANGED" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - uses: ./.github/actions/setup
        if: steps.browser-changes.outputs.changed == 'true'
      - uses: ./.github/actions/setup-playwright
        if: steps.browser-changes.outputs.changed == 'true'

      - name: Run unit tests (browser)
        if: steps.browser-changes.outputs.changed == 'true'
        run: bun run --cwd applications/web test:unit:client -- --run
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run end-to-end tests
        if: steps.browser-changes.outputs.changed == 'true'
        run: bun run --cwd applications/web test:e2e
        env:
          E2E_TEST_SECRET: tribunal-ci-e2e-secret
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify dev server starts without esbuild parse errors
        if: steps.browser-changes.outputs.changed == 'true'
        working-directory: applications/web
        shell: bash
        run: |
          set -euo pipefail
          bun run dev &
          DEV_PID=$!
          # Poll for the server to be ready (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/ >/dev/null 2>&1; then
              echo "Dev server is up after ${i}s"
              kill "$DEV_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill "$DEV_PID" 2>/dev/null || true
          echo "Dev server did not start within 30 seconds"
          exit 1
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
          GITHUB_APP_ID: '1'
          GITHUB_APP_PRIVATE_KEY: 'placeholder'
          GITHUB_OAUTH_CLIENT_ID: 'placeholder'
          GITHUB_OAUTH_CLIENT_SECRET: 'placeholder'
          SESSION_SECRET: 'placeholder-secret-at-least-32-chars-long'

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - name: Build
        run: bunx turbo run build ${{ github.event_name == 'pull_request' && '--affected' || '' }}
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder

  container-images:
    name: Container Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TENSORLAKE_API_KEY: ${{ secrets.TENSORLAKE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build container images
        shell: bash
        run: |
          set -euo pipefail
          reviewer_context="$RUNNER_TEMP/tensorlake-reviewer-context"
          rm -rf "$reviewer_context"
          mkdir -p "$reviewer_context"

          git archive HEAD -- \
            package.json \
            bun.lock \
            applications/engine/package.json \
            applications/proxy/package.json \
            applications/web/package.json \
            packages \
            runner \
            scripts/package.json \
            scripts/install-git-hooks.ts \
            deployment/containers/reviewer.Dockerfile \
            | tar -x -f - -C "$reviewer_context"

          cp "$reviewer_context/deployment/containers/reviewer.Dockerfile" "$reviewer_context/Dockerfile"

          # The reviewer image consumes prebuilt dist (see the deploy
          # workflow's staging step); build it here the same way.
          bun install --frozen-lockfile --filter tribunal --filter @tribunal/review-core --filter @tribunal/agents
          bun run --cwd packages/review-core build
          bun run --cwd packages/agents build
          cp -R packages/review-core/dist "$reviewer_context/packages/review-core/dist"
          cp -R packages/agents/dist "$reviewer_context/packages/agents/dist"

          docker build -f deployment/containers/web.Dockerfile -t tribunal-web:test .
          docker build -f deployment/containers/engine.Dockerfile -t tribunal-engine:test .
          docker build -f deployment/containers/proxy.Dockerfile -t tribunal-proxy:test .
          docker build -f "$reviewer_context/Dockerfile" -t tribunal-reviewer:test "$reviewer_context"
          docker run --rm tribunal-reviewer:test
      - name: Publish reviewer image to Tensorlake
        if: ${{ env.TENSORLAKE_API_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install tensorlake
          published_image="$(tl sbx image create --image tribunal-reviewer:test)"
          echo "TRIBUNAL_SANDBOX_IMAGE=${published_image}" >> "$GITHUB_ENV"
      - name: Boot images on injected ports
        shell: bash
        run: |
          set -euo pipefail
          : "${TRIBUNAL_SANDBOX_IMAGE:=tribunal-reviewer:test}"

          docker run -d --rm --name tribunal-postgres-test \
            -e POSTGRES_USER=tribunal \
            -e POSTGRES_PASSWORD=tribunal \
            -e POSTGRES_DB=tribunal \
            -p 5433:5432 postgres:16
          docker run -d --rm --name tribunal-redis-test -p 6380:6379 redis:7
          for attempt in 1 2 3 4 5; do
            if docker exec tribunal-postgres-test pg_isready -U tribunal -d tribunal >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for attempt in 1 2 3 4 5; do
            if docker exec tribunal-redis-test redis-cli ping >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          database_url=postgres://tribunal:tribunal@host.docker.internal:5433/tribunal
          redis_url=redis://host.docker.internal:6380

          docker run -d --rm --name tribunal-web-test \
            --add-host=host.docker.internal:host-gateway \
            -e PORT=4310 \
            -e DATABASE_URL="${database_url}" \
            -e REDIS_URL="${redis_url}" \
            -p 4310:4310 tribunal-web:test
          docker run -d --rm --name tribunal-engine-test \
            --add-host=host.docker.internal:host-gateway \
            -e PORT=4311 \
            -e DATABASE_URL="${database_url}" \
            -e GITHUB_APP_ID=12345 \
            -e GITHUB_APP_PRIVATE_KEY=ci-placeholder \
            -e TENSORLAKE_API_KEY=tl_ci_placeholder \
            -e TRIBUNAL_SANDBOX_IMAGE="${TRIBUNAL_SANDBOX_IMAGE}" \
            -e TRIBUNAL_PROXY_URL=http://host.docker.internal:4312 \
            -e TRIBUNAL_PROXY_CIDR=127.0.0.1/32 \
            -e PROXY_SIGNING_KEY=ci-placeholder \
            -e ENCRYPTION_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            -e TRIBUNAL_ENGINE_ALLOW_EPHEMERAL_STORAGE=1 \
            -e TRIBUNAL_ENGINE_CONTROL_TOKEN=ci-engine-control-token \
            -e TRIBUNAL_DEFAULT_MODEL=claude-sonnet-4-6 \
            -e DEFAULT_DAILY_COST_CAP_USD=25 \
            -e IDLE_SUSPEND_SECONDS=900 \
            -e SANDBOX_REAP_INTERVAL=300 \
            -e ENABLE_PROMPT_CACHING_1H=true \
            -e ANTHROPIC_ADMIN_KEY=sk-ant-admin-ci-placeholder \
            -p 4311:4311 tribunal-engine:test
          docker run -d --rm --name tribunal-proxy-test \
            --add-host=host.docker.internal:host-gateway \
            -e PORT=4312 \
            -e DATABASE_URL="${database_url}" \
            -e REDIS_URL="${redis_url}" \
            -e GITHUB_APP_ID=12345 \
            -e GITHUB_APP_PRIVATE_KEY=ci-placeholder \
            -e ANTHROPIC_API_KEY=sk-ant-ci-placeholder \
            -e TRIBUNAL_PROXY_URL=http://localhost:4312 \
            -e TRIBUNAL_PROXY_CIDR=127.0.0.1/32 \
            -e PROXY_CA_CERT=ci-placeholder \
            -e PROXY_SIGNING_KEY=ci-placeholder \
            -e ENCRYPTION_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            -e GITHUB_EGRESS_ALLOW=github.com,api.github.com \
            -e ANTHROPIC_EGRESS_ALLOW=api.anthropic.com \
            -p 4312:4312 tribunal-proxy:test

          cleanup() {
            docker stop tribunal-web-test tribunal-engine-test tribunal-proxy-test tribunal-postgres-test tribunal-redis-test >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for service in web:4310 engine:4311 proxy:4312; do
            name="${service%%:*}"
            port="${service##*:}"
            ready=0
            for attempt in {1..30}; do
              if curl -sf "http://127.0.0.1:${port}/health" >/tmp/"${name}-health.json"; then
                ready=1
                break
              fi
              sleep 1
            done
            if [ "$ready" -ne 1 ]; then
              echo "::error::${name} container did not become healthy on injected port ${port}"
              docker logs "tribunal-${name}-test" || true
              exit 1
            fi
            cat /tmp/"${name}-health.json"
          done

  migration:
    name: Migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tribunal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: test
      PGPASSWORD: test
      PGDATABASE: tribunal_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check migration consistency
        run: bun run db:check
      - name: Apply migrations
        run: |
          for f in packages/database/drizzle/[0-9]*.sql; do
            echo "Applying $f..."
            psql -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Verify rename migration compatibility with pre-renamed template tables
        run: |
          set -euo pipefail

          # Reproduce a production failure mode where the table had already
          # been renamed to "template" before migration 0015 ran through
          # drizzle-kit migrate.
          compatibility_database_name="tribunal_migration_compatibility"
          compatibility_database_url="postgres://test:test@localhost:5432/${compatibility_database_name}"

          psql -v ON_ERROR_STOP=1 -d postgres -c "DROP DATABASE IF EXISTS ${compatibility_database_name};"
          psql -v ON_ERROR_STOP=1 -d postgres -c "CREATE DATABASE ${compatibility_database_name};"

          for migration_file in packages/database/drizzle/[0-9]*.sql; do
            if [ "$(basename "$migration_file")" = "0015_dep-636-rename-placeholder-to-template.sql" ]; then
              break
            fi
            psql "$compatibility_database_url" -v ON_ERROR_STOP=1 -f "$migration_file"
          done

          psql "$compatibility_database_url" -v ON_ERROR_STOP=1 <<'SQL'
            ALTER TABLE "placeholder" RENAME TO "template";
            ALTER TABLE "template" RENAME CONSTRAINT "placeholder_pkey" TO "template_pkey";
            ALTER TABLE "template" RENAME CONSTRAINT "placeholder_workspace_id_workspace_id_fk" TO "template_workspace_id_workspace_id_fk";
            ALTER INDEX "placeholder_workspace_idx" RENAME TO "template_workspace_idx";

            CREATE SCHEMA IF NOT EXISTS drizzle;
            CREATE TABLE IF NOT EXISTS drizzle."__drizzle_migrations" (
              id SERIAL PRIMARY KEY,
              hash text NOT NULL,
              created_at bigint
            );
          SQL

          for migration_file in packages/database/drizzle/[0-9]*.sql; do
            if [ "$(basename "$migration_file")" = "0015_dep-636-rename-placeholder-to-template.sql" ]; then
              break
            fi
            migration_hash=$(sha256sum "$migration_file" | awk '{print $1}')
            psql "$compatibility_database_url" -v ON_ERROR_STOP=1 -c \
              "INSERT INTO drizzle.\"__drizzle_migrations\" (hash, created_at) VALUES ('${migration_hash}', (EXTRACT(EPOCH FROM NOW()) * 1000)::bigint);"
          done

          # Apply remaining migrations directly with psql (drizzle-kit migrate doesn't work with local postgres)
          for migration_file in packages/database/drizzle/[0-9]*.sql; do
            migration_name=$(basename "$migration_file")
            if [ "$migration_name" \< "0015_dep-636-rename-placeholder-to-template.sql" ]; then
              continue
            fi
            echo "Applying remaining migration: $migration_name"
            psql "$compatibility_database_url" -v ON_ERROR_STOP=1 -f "$migration_file"
          done

          # Reproduce a second production failure mode:
          # migration history says 0014 is applied, but neither table exists.
          missing_table_database_name="tribunal_migration_missing_template"
          missing_table_database_url="postgres://test:test@localhost:5432/${missing_table_database_name}"

          psql -v ON_ERROR_STOP=1 -d postgres -c "DROP DATABASE IF EXISTS ${missing_table_database_name};"
          psql -v ON_ERROR_STOP=1 -d postgres -c "CREATE DATABASE ${missing_table_database_name};"

          for migration_file in packages/database/drizzle/[0-9]*.sql; do
            if [ "$(basename "$migration_file")" = "0015_dep-636-rename-placeholder-to-template.sql" ]; then
              break
            fi
            psql "$missing_table_database_url" -v ON_ERROR_STOP=1 -f "$migration_file"
          done

          psql "$missing_table_database_url" -v ON_ERROR_STOP=1 <<'SQL'
            DROP TABLE IF EXISTS "placeholder" CASCADE;
            DROP TABLE IF EXISTS "template" CASCADE;

            CREATE SCHEMA IF NOT EXISTS drizzle;
            CREATE TABLE IF NOT EXISTS drizzle."__drizzle_migrations" (
              id SERIAL PRIMARY KEY,
              hash text NOT NULL,
              created_at bigint
            );
          SQL

          for migration_file in packages/database/drizzle/[0-9]*.sql; do
            if [ "$(basename "$migration_file")" = "0015_dep-636-rename-placeholder-to-template.sql" ]; then
              break
            fi
            migration_hash=$(sha256sum "$migration_file" | awk '{print $1}')
            psql "$missing_table_database_url" -v ON_ERROR_STOP=1 -c \
              "INSERT INTO drizzle.\"__drizzle_migrations\" (hash, created_at) VALUES ('${migration_hash}', (EXTRACT(EPOCH FROM NOW()) * 1000)::bigint);"
          done

          # Apply remaining migrations directly with psql (drizzle-kit migrate doesn't work with local postgres)
          for migration_file in packages/database/drizzle/[0-9]*.sql; do
            migration_name=$(basename "$migration_file")
            if [ "$migration_name" \< "0015_dep-636-rename-placeholder-to-template.sql" ]; then
              continue
            fi
            echo "Applying remaining migration: $migration_name"
            psql "$missing_table_database_url" -v ON_ERROR_STOP=1 -f "$migration_file"
          done
      - name: Verify schema structure
        run: |
          TABLE_COUNT=$(psql -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public'")
          echo "Tables found: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -lt 10 ]; then
            echo "::error::Expected at least 10 tables, found $TABLE_COUNT"
            exit 1
          fi

          # Count SQL files applied by the psql loop above and compare against the
          # journal. We do not query drizzle.__drizzle_migrations here because that
          # table is only populated by drizzle-kit migrate, not by raw psql execution.
          APPLIED_COUNT=$(ls packages/database/drizzle/[0-9]*.sql 2>/dev/null | wc -l | tr -d ' ')
          EXPECTED_COUNT=$(jq '.entries | length' packages/database/drizzle/meta/_journal.json)
          echo "SQL files applied: $APPLIED_COUNT / $EXPECTED_COUNT expected"
          if [ "$APPLIED_COUNT" != "$EXPECTED_COUNT" ]; then
            echo "::error::Migration file count mismatch: applied $APPLIED_COUNT SQL files, journal has $EXPECTED_COUNT entries"
            exit 1
          fi
      - name: Check for uncommitted schema drift
        run: bun run --cwd packages/database check:migrations

  ci-status:
    name: CI Status
    if: always()
    needs:
      [type-check, lint-format, test-unit, coverage, test-browser, build, container-images, migration]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
