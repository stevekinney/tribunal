name: Neon Pull Request Branches

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - closed

permissions:
  contents: read
  pull-requests: read

jobs:
  create-and-migrate:
    name: Create and Migrate Neon Branch
    if: ${{ github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository && (github.event.action != 'edited' || github.event.changes.base.ref.from != null) }}
    runs-on: ubuntu-latest
    concurrency:
      group: neon-pull-request-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    timeout-minutes: 15
    steps:
      - name: Check pull request state
        id: pull-request-state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          pull_request="$(gh api "repos/${REPOSITORY}/pulls/${PULL_REQUEST_NUMBER}")"
          state="$(jq -r '.state' <<< "$pull_request")"
          base_ref="$(jq -r '.base.ref' <<< "$pull_request")"
          echo "state=${state}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"

      - name: Validate Neon cleanup configuration
        if: steps.pull-request-state.outputs.state != 'open' || steps.pull-request-state.outputs.base_ref != 'main'
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "$NEON_PROJECT_ID" ]; then
            echo "::error::NEON_PROJECT_ID repository variable is required"
            exit 1
          fi
          if [ -z "$NEON_API_KEY" ]; then
            echo "::error::NEON_API_KEY repository secret is required"
            exit 1
          fi

      - name: Delete Neon branch after stale pull request event
        if: steps.pull-request-state.outputs.state != 'open' || steps.pull-request-state.outputs.base_ref != 'main'
        id: delete-neon-branch-after-state-check
        shell: bash
        env:
          NEON_API_HOST: https://console.neon.tech/api/v2
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_BRANCH_NAME: preview/pr-${{ github.event.pull_request.number }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail

          encoded_branch_name="$(jq -nr --arg value "$NEON_BRANCH_NAME" '$value | @uri')"
          branches_response="$(curl -fsS \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "${NEON_API_HOST}/projects/${NEON_PROJECT_ID}/branches?search=${encoded_branch_name}&limit=10")"

          branch_id="$(jq -r --arg name "$NEON_BRANCH_NAME" \
            '.branches[] | select(.name == $name) | .id' <<< "$branches_response" | head -n 1)"

          if [ -z "$branch_id" ]; then
            echo "Neon branch ${NEON_BRANCH_NAME} does not exist; nothing to delete."
            echo "deleted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          curl -fsS -X DELETE \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "${NEON_API_HOST}/projects/${NEON_PROJECT_ID}/branches/${branch_id}" \
            >/dev/null
          echo "deleted=true" >> "$GITHUB_OUTPUT"

      - name: Write stale-event cleanup summary
        if: steps.pull-request-state.outputs.state != 'open' || steps.pull-request-state.outputs.base_ref != 'main'
        shell: bash
        env:
          NEON_BRANCH_DELETED: ${{ steps.delete-neon-branch-after-state-check.outputs.deleted }}
          NEON_BRANCH_NAME: preview/pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "$NEON_BRANCH_DELETED" = "true" ]; then
            echo "Deleted Neon branch \`${NEON_BRANCH_NAME}\` after stale pull request event." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Neon branch \`${NEON_BRANCH_NAME}\` was already absent after stale pull request event." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate Neon configuration
        if: steps.pull-request-state.outputs.state == 'open' && steps.pull-request-state.outputs.base_ref == 'main'
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "$NEON_PROJECT_ID" ]; then
            echo "::error::NEON_PROJECT_ID repository variable is required"
            exit 1
          fi
          if [ -z "$NEON_API_KEY" ]; then
            echo "::error::NEON_API_KEY repository secret is required"
            exit 1
          fi

      - name: Create or reuse Neon branch
        if: steps.pull-request-state.outputs.state == 'open' && steps.pull-request-state.outputs.base_ref == 'main'
        id: create-neon-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}
          parent_branch: ${{ vars.NEON_PARENT_BRANCH }}
          database: ${{ vars.NEON_DATABASE_NAME || 'neondb' }}
          role: ${{ vars.NEON_DATABASE_ROLE || 'neondb_owner' }}
          suspend_timeout: ${{ vars.NEON_SUSPEND_TIMEOUT_SECONDS || '300' }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Reset Neon branch to parent
        if: steps.pull-request-state.outputs.state == 'open' && steps.pull-request-state.outputs.base_ref == 'main'
        id: reset-neon-branch
        uses: neondatabase/reset-branch-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.pull_request.number }}
          parent: true
          cs_database: ${{ vars.NEON_DATABASE_NAME || 'neondb' }}
          cs_role_name: ${{ vars.NEON_DATABASE_ROLE || 'neondb_owner' }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Validate reset connection string
        if: steps.pull-request-state.outputs.state == 'open' && steps.pull-request-state.outputs.base_ref == 'main'
        shell: bash
        env:
          DATABASE_URL: ${{ steps.reset-neon-branch.outputs.db_url }}
        run: |
          set -euo pipefail
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Neon reset did not return a DATABASE_URL"
            exit 1
          fi

      - uses: actions/checkout@v4
        if: steps.pull-request-state.outputs.state == 'open' && steps.pull-request-state.outputs.base_ref == 'main'
      - uses: ./.github/actions/setup
        if: steps.pull-request-state.outputs.state == 'open' && steps.pull-request-state.outputs.base_ref == 'main'

      - name: Apply migrations
        if: steps.pull-request-state.outputs.state == 'open' && steps.pull-request-state.outputs.base_ref == 'main'
        run: bun run db:migrate
        env:
          DATABASE_URL: ${{ steps.reset-neon-branch.outputs.db_url }}

      - name: Validate database invariants
        if: steps.pull-request-state.outputs.state == 'open' && steps.pull-request-state.outputs.base_ref == 'main'
        run: bun run --cwd packages/database db:validate-invariants
        env:
          DATABASE_URL: ${{ steps.reset-neon-branch.outputs.db_url }}

      - name: Write branch summary
        if: steps.pull-request-state.outputs.state == 'open' && steps.pull-request-state.outputs.base_ref == 'main'
        shell: bash
        env:
          NEON_BRANCH_CREATED: ${{ steps.create-neon-branch.outputs.created }}
          NEON_BRANCH_ID: ${{ steps.create-neon-branch.outputs.branch_id }}
          NEON_BRANCH_NAME: preview/pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          {
            echo "### Neon pull request branch"
            echo ""
            echo "- Branch: \`${NEON_BRANCH_NAME}\`"
            echo "- Branch ID: \`${NEON_BRANCH_ID}\`"
            echo "- Created: \`${NEON_BRANCH_CREATED}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  delete:
    name: Delete Neon Branch
    if: ${{ github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    concurrency:
      group: neon-pull-request-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    timeout-minutes: 5
    steps:
      - name: Check pull request state
        id: pull-request-state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          pull_request="$(gh api "repos/${REPOSITORY}/pulls/${PULL_REQUEST_NUMBER}")"
          state="$(jq -r '.state' <<< "$pull_request")"
          base_ref="$(jq -r '.base.ref' <<< "$pull_request")"
          echo "state=${state}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"

      - name: Validate Neon configuration
        if: steps.pull-request-state.outputs.state != 'open' || steps.pull-request-state.outputs.base_ref != 'main'
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "$NEON_PROJECT_ID" ]; then
            echo "::error::NEON_PROJECT_ID repository variable is required"
            exit 1
          fi
          if [ -z "$NEON_API_KEY" ]; then
            echo "::error::NEON_API_KEY repository secret is required"
            exit 1
          fi

      - name: Delete Neon branch
        if: steps.pull-request-state.outputs.state != 'open' || steps.pull-request-state.outputs.base_ref != 'main'
        id: delete-neon-branch
        shell: bash
        env:
          NEON_API_HOST: https://console.neon.tech/api/v2
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_BRANCH_NAME: preview/pr-${{ github.event.pull_request.number }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail

          encoded_branch_name="$(jq -nr --arg value "$NEON_BRANCH_NAME" '$value | @uri')"
          branches_response="$(curl -fsS \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "${NEON_API_HOST}/projects/${NEON_PROJECT_ID}/branches?search=${encoded_branch_name}&limit=10")"

          branch_id="$(jq -r --arg name "$NEON_BRANCH_NAME" \
            '.branches[] | select(.name == $name) | .id' <<< "$branches_response" | head -n 1)"

          if [ -z "$branch_id" ]; then
            echo "Neon branch ${NEON_BRANCH_NAME} does not exist; nothing to delete."
            echo "deleted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          curl -fsS -X DELETE \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "${NEON_API_HOST}/projects/${NEON_PROJECT_ID}/branches/${branch_id}" \
            >/dev/null
          echo "deleted=true" >> "$GITHUB_OUTPUT"

      - name: Write deletion summary
        if: steps.pull-request-state.outputs.state != 'open' || steps.pull-request-state.outputs.base_ref != 'main'
        shell: bash
        env:
          NEON_BRANCH_DELETED: ${{ steps.delete-neon-branch.outputs.deleted }}
          NEON_BRANCH_NAME: preview/pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "$NEON_BRANCH_DELETED" = "true" ]; then
            echo "Deleted Neon branch \`${NEON_BRANCH_NAME}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Neon branch \`${NEON_BRANCH_NAME}\` was already absent." >> "$GITHUB_STEP_SUMMARY"
          fi
